<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sign-in-page-style.css">
    <link rel="website icon" type="png" href="image/food-sticker-label-vector-illustration-design_790237-1038.avif">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Sign-in/fast food</title>
</head>
<body>
    <header>
        <div class="header-option">
            <a href="#" title="پنل کاربری"><i class="bi bi-person-circle"></i></a>
            <a href="home-page.html" title="خانه"><i class="bi bi-house"></i></a>
            <a href="" title="پشتیبانی"><i class="bi bi-headset"></i></a>
            <h1>فست فود آسیا</h1>
        </div>
    </header>
    <main>
        <div class="sign-in">
            <div class="container">
                <div class="login">
                    <label id="lab">نام کاربری :</label>
                    <input id="in" type="text" placeholder="نام کاربری خودرا وارد کنید">
                    <label id="lab">شماره تماس : </label>
                    <input id="in" type="text" placeholder="شماره تماس خودرا وار کنید">
                    <label id="lab">پسورد : </label>
                    <input id="in" type="text" placeholder="پسورد ایمیل خودرا وار کنید">
                    <button id="enter">تایید و ادامه</button>
                </div>
                <div class="create-new">
                    <label id="label1">نام : </label>
                    <input id="in1" type="text" placeholder="نام خودرا وارد کنید">
                    <label id="label1">نام خانوادگی : </label>
                    <input id="in1" type="text" placeholder="نام خانوادگی خودرا وارد کنید">
                    <label id="label1">شماره تماس : </label>
                    <input id="in1" type="text" placeholder="شماره تماس خودرا وارد کنید">
                    <label id="label1">ایمیل : </label>
                    <input id="in1" type="email" placeholder="ایمیل خودا وارد کنید">
                    <label id="label1">پسورد : </label>
                    <input id="in1" type="password" placeholder="پسورد خودرا وارد کنید">
                    <label id="label1">پسور :</label>
                    <input id="in1" type="password" placeholder="پسورد خودرا دوباره وارد کنید">
                    <label id="label1">نام کاربری :</label>
                    <input id="in1" type="text" placeholder="نام کاربری خودرا وارد کنید">
                    <a href="#" style="text-decoration: none;"><button id="create">تایید و ادامه</button></a>
                </div>
                <div id="switch-page">
                    <h1 id="switch-page-title">ساخت اکانت جدید</h1>
                    <p id="text">اگر تا به حال هیچ اکانتی در این سایت باز نکرده ای یااگر مشخصات اکانتت رو فراموش کرده ای از این پنل یک اکانت جدید بساز</p>
                    <button id="switch"><i class="bi bi-arrow-left-short" id="arrow"></i></button>
                </div>
            </div>
        </div>
    </main>













    <script src="sign-in-script.js"></script>
</body>
</html>
